name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows package
        run: npm run make

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LinkNotes-windows-${{ github.ref_name }}
          path: |
            out/make/**/*
          if-no-files-found: error
          retention-days: 14

      - name: Create or update release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG_NAME --generate-notes
          }

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $assets = Get-ChildItem -Path "out/make" -Recurse -File |
            Where-Object { $_.Extension -in ".exe", ".zip", ".nupkg", ".msi" } |
            ForEach-Object { $_.FullName }

          if (-not $assets) {
            throw "未找到可上传到 Release 的构建产物。"
          }

          gh release upload $env:TAG_NAME $assets --clobber
